name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        run: cargo xtask bundle hardwave-pumpcontrol --release

      - name: Package
        run: |
          cd target/bundled
          zip -r hardwave-pumpcontrol-linux-x64.zip hardwave-pumpcontrol.vst3 hardwave-pumpcontrol.clap

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hardwave-pumpcontrol-linux-x64
          path: target/bundled/hardwave-pumpcontrol-linux-x64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo xtask bundle hardwave-pumpcontrol --release

      - name: Package
        shell: bash
        run: |
          cd target/bundled
          7z a -tzip hardwave-pumpcontrol-windows-x64.zip hardwave-pumpcontrol.vst3 hardwave-pumpcontrol.clap

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hardwave-pumpcontrol-windows-x64
          path: target/bundled/hardwave-pumpcontrol-windows-x64.zip

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo xtask bundle hardwave-pumpcontrol --release --target x86_64-apple-darwin

      - name: Package
        run: |
          cd target/bundled
          zip -r hardwave-pumpcontrol-macos-x64.zip hardwave-pumpcontrol.vst3 hardwave-pumpcontrol.clap

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hardwave-pumpcontrol-macos-x64
          path: target/bundled/hardwave-pumpcontrol-macos-x64.zip

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo xtask bundle hardwave-pumpcontrol --release --target aarch64-apple-darwin

      - name: Package
        run: |
          cd target/bundled
          zip -r hardwave-pumpcontrol-macos-arm64.zip hardwave-pumpcontrol.vst3 hardwave-pumpcontrol.clap

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hardwave-pumpcontrol-macos-arm64
          path: target/bundled/hardwave-pumpcontrol-macos-arm64.zip

  release:
    needs: [build-linux, build-windows, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create universal macOS zip
        run: |
          mkdir -p universal-macos/hardwave-pumpcontrol.vst3/Contents
          cd artifacts/hardwave-pumpcontrol-macos-arm64
          unzip hardwave-pumpcontrol-macos-arm64.zip
          cd ../..
          cd artifacts/hardwave-pumpcontrol-macos-x64
          unzip hardwave-pumpcontrol-macos-x64.zip
          cd ../..
          cp -r artifacts/hardwave-pumpcontrol-macos-arm64/hardwave-pumpcontrol.vst3 universal-macos/
          cp -r artifacts/hardwave-pumpcontrol-macos-arm64/hardwave-pumpcontrol.clap universal-macos/
          cd universal-macos
          zip -r hardwave-pumpcontrol-macos-universal.zip hardwave-pumpcontrol.vst3 hardwave-pumpcontrol.clap

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Hardwave PumpControl ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            artifacts/hardwave-pumpcontrol-linux-x64/*.zip
            artifacts/hardwave-pumpcontrol-windows-x64/*.zip
            universal-macos/hardwave-pumpcontrol-macos-universal.zip
          body: |
            ## Hardwave PumpControl ${{ steps.version.outputs.version }}

            Drawable volume shaper with tempo sync and multiband processing — powered by Hardwave Studios.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows x64 | `hardwave-pumpcontrol-windows-x64.zip` |
            | Linux x64 | `hardwave-pumpcontrol-linux-x64.zip` |
            | macOS Universal (Intel + Apple Silicon) | `hardwave-pumpcontrol-macos-universal.zip` |

            ### Installation

            **Windows:**
            1. Extract the zip
            2. Copy `hardwave-pumpcontrol.vst3` folder to `C:\Program Files\Common Files\VST3\`
            3. Copy `hardwave-pumpcontrol.clap` to `C:\Program Files\Common Files\CLAP\`

            **macOS:**
            1. Extract: `unzip hardwave-pumpcontrol-macos-universal.zip`
            2. Copy `hardwave-pumpcontrol.vst3` to `~/Library/Audio/Plug-Ins/VST3/`
            3. Copy `hardwave-pumpcontrol.clap` to `~/Library/Audio/Plug-Ins/CLAP/`

            **Linux:**
            1. Extract: `unzip hardwave-pumpcontrol-linux-x64.zip`
            2. Copy to `~/.vst3/` and `~/.clap/`

      - name: Update product database
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"

          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.225.219.184 >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@46.225.219.184"

          BASE="https://github.com/Dishairano/hardwave-pumpcontrol-vst/releases/download/${VERSION}"
          $SSH "docker exec hardwave-database mysql -u fl_organizer_user -p'FlOrganizer2024Secure!' fl_organizer_db -e \"
            UPDATE products SET
              current_version = '${VERSION_NUM}',
              download_url_windows = '${BASE}/hardwave-pumpcontrol-windows-x64.zip',
              download_url_mac     = '${BASE}/hardwave-pumpcontrol-macos-universal.zip',
              download_url_linux   = '${BASE}/hardwave-pumpcontrol-linux-x64.zip'
            WHERE slug = 'pumpcontrol';
            INSERT INTO plugin_versions (slug, version) VALUES ('pumpcontrol', '${VERSION}')
              ON DUPLICATE KEY UPDATE version = '${VERSION}';
          \""

          echo "Database updated: pumpcontrol -> ${VERSION_NUM}"
          rm -f ~/.ssh/deploy_key
